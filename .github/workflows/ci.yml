name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install via conda for RDKit, ProDy, Vina (conda-forge packages)
          # For CI we install the pure-Python subset that pip can handle
          pip install -e ".[dev]" --no-deps || true
          pip install pytest pytest-cov numpy scipy requests jinja2 rich typer questionary

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_integration.py

      - name: Upload coverage
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
