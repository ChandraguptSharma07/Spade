name: Build and push Docker image

on:
  push:
    branches:
      - main          # push main → :latest tag
    tags:
      - "v*"          # push v1.2.3 → :v1.2.3 + :latest tags

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/spade
          tags: |
            # :latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # :v1.2.3 on version tag push
            type=semver,pattern={{version}}
            # :v1.2 (minor)
            type=semver,pattern={{major}}.{{minor}}
            # short git SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Platforms: linux/amd64 is sufficient for most HPC and cloud use
          platforms: linux/amd64
