name: spade
channels:
  - conda-forge
  - defaults

dependencies:
  # Python runtime
  - python=3.10

  # Core scientific stack — conda wheels handle compiled extensions reliably
  - numpy>=1.24
  - scipy>=1.10
  - prody>=2.4
  - rdkit>=2023.3
  - numba>=0.58

  # Docking and interaction fingerprinting
  - vina>=1.2
  - prolif>=2.0
  - mdanalysis>=2.6        # prolif dependency; conda wheel avoids C-extension issues

  # Cheminformatics
  - scikit-learn>=1.3

  # Interface
  - rich>=13.0
  - typer>=0.9
  - questionary>=2.0
  - jinja2>=3.1
  - requests>=2.28

  # pip-only packages (not on conda-forge or newer API needed)
  - pip
  - pip:
    - meeko>=0.5
    - dimorphite-dl>=1.3
    - biotite>=0.37
    - py3dmol>=2.0
    - spade-docking>=0.1.0   # install SPADE itself last, after all deps are resolved
